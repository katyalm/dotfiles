set -g mouse on
set -g history-limit 100000
set -g escape-time 0
set -g set-clipboard on

# tmux rendering
# set -g default-terminal "tmux-256color"
# set -as terminal-features ',*:RGB'

# xterm rendering
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Index from 1 (easier to switch between a few screens)
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# Don't rename automatically
set -g automatic-rename off
set -g allow-rename off

# Make SSH Forwarding work properly
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
set-environment -g SSH_AUTH_SOCK ~/.ssh/ssh_auth_sock

# vim-tmux-navigator
forward_programs="view|nvim|fzf"

should_forward="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?($forward_programs)(diff)?$'"

bind -n C-h if-shell "$should_forward" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$should_forward" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$should_forward" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$should_forward" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$should_forward" "send-keys C-\\" "select-pane -l"

# Preserve Ctrl+L for clearing screen (prefix + Ctrl+L still works)
bind C-l send-keys 'C-l'

# Don't ask for confirmation when killing panes/windows
bind x kill-pane
bind & kill-window

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Reload for testing
bind r source-file ~/.tmux.conf

### Personal settings ###
set -g default-shell  "/usr/bin/zsh"

# Prefix
set -g prefix2 C-f

### Dracula colors ###
# status bar background + text
set -g status-style "bg=#44475a,fg=#f8f8f2"

# left section: session name
set -g status-left-length 100
set -g status-left "#[fg=#282a36,bg=#50fa7b] #S "

# window list: inactive windows
set -g window-status-style "fg=#f8f8f2,bg=#44475a"
set -g window-status-format " #I #W "

# current window: highlighted
set -g window-status-current-style "fg=#f8f8f2,bg=#6272a4"
set -g window-status-current-format " #I #W "

# no right side
set -g status-right ""

# pane background + borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set -g window-active-style "bg=#1e1f2e"
set -g window-style "bg=#282a36"

# open new windows in home directory
bind c new-window -c "~"
